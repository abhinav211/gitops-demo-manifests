apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gitops-demo

spec:
  template:
    spec:
      containers:
        - name: app
          image: ghcr.io/abhinav211/gitops-demo:v1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: STAGE
            - name: VERSION
              value: "1.0.0"
            - name: STRATEGY
              value: BLUE-GREEN

  strategy:
    blueGreen:
      activeService: gitops-demo-active
      previewService: gitops-demo-preview
      autoPromotionEnabled: false
