apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-demo
  namespace: dev
spec:
  replicas: 1

  selector:
    matchLabels:
      app: gitops-demo

  template:
    metadata:
      labels:
        app: gitops-demo

    spec:
      imagePullSecrets:
      - name: ghcr-secret

      containers:
      - name: app
        image: ghcr.io/abhinav211/gitops-demo:v1.0.0
        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        env:
        - name: ENVIRONMENT
          value: DEV

        - name: VERSION
          value: "1.0.0"

        - name: STRATEGY
          value: BLUE-GREEN
